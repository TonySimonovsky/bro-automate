<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128"
     fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="5">

  <!-- Window outline (50% gray); square 116×116 with 6px padding to fill viewBox -->
  <rect x="6" y="6" width="116" height="116" rx="14" stroke="#808080"/>

  <!-- Tab-bar divider (30% lighter = #A6A6A6, 30% thinner = 3.5); header = 30% × 116 = 35 → divider at y=41 -->
  <line x1="14" y1="41" x2="114" y2="41" stroke="#A6A6A6" stroke-width="3.5"/>

  <!-- Window controls: red, gray (matches divider), green; r=8.75 so 4r=35=header height -->
  <circle cx="22" cy="23.5" r="8.75" fill="#FF5F57"/>
  <circle cx="42" cy="23.5" r="8.75" fill="#A6A6A6"/>
  <circle cx="62" cy="23.5" r="8.75" fill="#28C840"/>

  <!-- Top brace (apex up) — scaled to new page area (y=41–122) -->
  <path d="M 89 73 Q 89 66 81 66 L 71 66 Q 64 66 64 56 Q 64 66 57 66 L 47 66 Q 39 66 39 73" stroke="#000000"/>

  <!-- Bottom brace (apex down) — scaled to new page area -->
  <path d="M 89 91 Q 89 98 81 98 L 71 98 Q 64 98 64 108 Q 64 98 57 98 L 47 98 Q 39 98 39 91" stroke="#000000"/>
</svg>
