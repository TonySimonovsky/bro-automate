# Runs the v0.01 Node test suite (no Chrome; mocks + subprocess checks under tests/).
name: Node tests

on:
  push:
  pull_request:

jobs:
  v001-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests/*.test.mjs
        run: |
          set -euo pipefail
          mapfile -t files < <(find tests -name '*.test.mjs' -print | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No *.test.mjs files under tests/"
            exit 1
          fi
          node --test --test-force-exit "${files[@]}"
